  <!-- Plus symbol detail -->
  <circle cx="21" cy="18" r="1.5" fill="#27AE60"/>
  <circle cx="35" cy="18" r="1.5" fill="#27AE60"/>
  <circle cx="21" cy="30" r="1.5" fill="#27AE60"/>
  <circle cx="35" cy="30" r="1.5" fill="#27AE60"/>

