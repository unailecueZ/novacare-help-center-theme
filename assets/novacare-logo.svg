        font-weight="700"
        fill="#2C5F8D">
    NovaCare
  </text>

  <!-- Tagline: Health -->
  <text x="145" y="30"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        font-weight="400"
