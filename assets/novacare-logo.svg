<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: Healthcare Cross with Heartbeat -->
  <rect x="2" y="18" width="28" height="12" rx="2" fill="#2C5F8D"/>
  <rect x="12" y="8" width="8" height="32" rx="2" fill="#2C5F8D"/>

  <!-- Heartbeat Line -->
  <path d="M4 24 L10 24 L13 16 L17 32 L20 24 L26 24"
        stroke="#4A90E2"
        stroke-width="2.5"
